<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>June Arcade - Install</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0;
      background: #1a1a2e; color: white;
    }
    .card {
      text-align: center; padding: 40px;
      background: #16213e; border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      max-width: 400px;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .install-btn {
      display: inline-block; padding: 16px 48px;
      background: #0a84ff; color: white;
      text-decoration: none; border-radius: 12px;
      font-size: 18px; font-weight: 600;
    }
    .install-btn:active { background: #0070e0; }
    .note { color: #666; font-size: 13px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>&#127984; June Arcade</h1>
    <p class="subtitle">Defend your kingdom!<br>v1.0 (Build 202605032059)</p>
    <a class="install-btn"
       href="itms-services://?action=download-manifest&url=https://jinhokim77.github.io/june-arcade-releases/manifest.plist">
      Install App
    </a>
    <p class="note">Open this page on your iOS device.<br>Tap Install, then check your home screen.</p>
    <p style="color: #fff; font-size: 18px; font-weight: 600; margin-top: 24px;" id="buildtime"></p>
  </div>
  <script>
    var d = new Date("2026-05-04T04:00:12Z");
    document.getElementById("buildtime").textContent = d.toLocaleString();
  </script>
</body>
</html>
